name: Flutter Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Build iOS'
        required: false
        default: false
        type: boolean
      build_web:
        description: 'Build Web'
        required: false
        default: false
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: false
        default: false
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: false
        default: false
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.44.5'

jobs:
  analyze:
    name: Analyze and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze || true

      - name: Run tests
        run: flutter test || true

  build-android:
    name: Build Android
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release --obfuscate --split-debug-info=./debug-info/android

      - name: Build AppBundle (Release)
        run: flutter build appbundle --release --obfuscate --split-debug-info=./debug-info/android

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    needs: analyze
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ios == true }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (Release)
        run: flutter build ios --release --no-codesign --obfuscate --split-debug-info=./debug-info/ios

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-builds
          path: build/ios/iphoneos

  build-web:
    name: Build Web
    needs: analyze
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_web == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (Release)
        run: flutter build web --release

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: build/web

  build-windows:
    name: Build Windows
    needs: analyze
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_windows == true }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows (Release)
        run: flutter build windows --release --obfuscate --split-debug-info=./debug-info/windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: build/windows/x64/runner/Release

  build-linux:
    name: Build Linux
    needs: analyze
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_linux == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux (Release)
        run: flutter build linux --release --obfuscate --split-debug-info=./debug-info/linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: build/linux/x64/release/bundle

  build-macos:
    name: Build macOS
    needs: analyze
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_macos == true }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS (Release)
        run: flutter build macos --release --obfuscate --split-debug-info=./debug-info/macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: build/macos/Build/Products/Release
