name: codebell
description: "码哨 - Claude Code Task Notification System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mqtt_client: ^10.0.0
  flutter_bloc: ^8.1.3
  bloc: ^8.1.4
  get_it: ^7.6.4
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0
  audioplayers: ^6.0.0
  vibration: ^2.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
